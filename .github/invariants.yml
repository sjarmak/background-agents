# Cross-Repo Invariant Definitions
# Each invariant declares a rule that must hold across all repositories.
# The agent verifies these using Sourcegraph MCP search capabilities.

invariants:
  - id: auth-init-required
    description: "Every service importing auth-lib MUST call auth.init() in its entrypoint"
    severity: critical
    search:
      # Find all files that import auth-lib
      pattern: "import.*auth-lib|require.*auth-lib|from auth_lib"
      language: "" # all languages
    assertion:
      # Each matching repo must also contain auth.init()
      must_contain: "auth\\.init\\("
      scope: repo # check at repo level, not file level
    message: "Repository imports auth-lib but never calls auth.init() — this causes silent auth bypass"

  - id: no-dual-db-clients
    description: "No repo should import both old-db-client and new-db-client"
    severity: high
    search:
      pattern: "old-db-client|old_db_client"
    assertion:
      must_not_contain: "new-db-client|new_db_client"
      scope: repo
    message: "Repository uses both old-db-client and new-db-client — pick one to avoid connection pool exhaustion"

  - id: no-deprecated-logger
    description: "No repo should use the deprecated console-logger package"
    severity: medium
    search:
      pattern: "console-logger|from console_logger"
    assertion:
      must_not_exist: true
    message: "Repository uses deprecated console-logger — migrate to structured-logger"

  - id: grpc-timeout-required
    description: "Every gRPC client call must specify a timeout/deadline"
    severity: high
    search:
      pattern: "grpc\\.Dial|grpc\\.NewClient|grpcClient\\."
      language: go
    assertion:
      must_contain: "WithTimeout|WithDeadline|context\\.WithTimeout"
      scope: file
    message: "gRPC client call without timeout — this can cause cascading failures"
