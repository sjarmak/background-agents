name: Cross-Repo Invariant Check (PR)

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.go"
      - "**/*.py"
      - "**/*.java"
      - "**/package.json"
      - "**/go.mod"
      - "**/requirements.txt"
      - "config/invariants.json"
      - "CLAUDE.md"

concurrency:
  group: invariant-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  verify-invariants:
    needs: build-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Pin trusted files to base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Prevent PR authors from modifying their own invariant checks, agent instructions,
          # or orchestration scripts. Always use the base branch versions of trust-boundary files.
          git fetch origin "$BASE_REF" --depth=1
          mkdir -p config
          # Fail closed: an empty ruleset would pass everything, so a missing
          # base-branch config is an infrastructure failure, not a pass.
          if ! git show "origin/$BASE_REF:config/invariants.json" > config/invariants.json 2>/dev/null; then
            echo "::error::config/invariants.json not found on base branch '$BASE_REF' — refusing to run with an empty ruleset"
            exit 1
          fi
          git show "origin/$BASE_REF:CLAUDE.md" > CLAUDE.md 2>/dev/null || true
          echo "Using trust-boundary files from base branch: $BASE_REF"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify cross-repo invariants
        id: verify
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SRC_ACCESS_TOKEN: ${{ secrets.SRC_ACCESS_TOKEN }}
        run: |
          # Mask secrets so they cannot be printed in logs
          echo "::add-mask::$SRC_ACCESS_TOKEN"
          echo "::add-mask::$SOURCEGRAPH_URL"
          # Run TS/GraphQL verifier; capture the real exit code without failing
          # the step (0 = pass, 1 = violations, 2 = infrastructure error).
          # The gate step below is authoritative on this code.
          EC=0
          npx tsx src/index.ts --mode=cli > report.json || EC=$?
          echo "exit_code=$EC" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: always() && steps.verify.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [[ ! -s report.json ]]; then
            echo "report.json missing or empty — skipping PR comment"
            exit 0
          fi

          MARKER="<!-- invariant-check-bot -->"

          # Build comment body
          BODY=$(scripts/post-github-comment.sh --format-only "$REPO" "$PR" < report.json)
          FULL_BODY=$(printf '%s\n%s' "$MARKER" "$BODY")

          # Find existing bot comment
          EXISTING=$(gh api "repos/$REPO/issues/$PR/comments" --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)

          if [[ -n "$EXISTING" ]]; then
            printf '%s' "$FULL_BODY" | gh api "repos/$REPO/issues/comments/$EXISTING" -X PATCH --field body=@-
            echo "Updated existing comment $EXISTING"
          else
            printf '%s' "$FULL_BODY" | gh pr comment "$PR" --repo "$REPO" --body-file -
            echo "Created new comment"
          fi

      - name: Fail on violations, errors, or incomplete results
        run: |
          # The verifier exit code is the authoritative gate; the jq checks
          # below are a completeness backstop only.
          EC="${{ steps.verify.outputs.exit_code }}"
          if [[ "$EC" == "1" ]]; then
            FAILING=$(jq -r '[.results[]? | select(.status == "fail") | .id] | join(", ")' report.json 2>/dev/null || echo "unknown")
            echo "::error::Invariant violation(s) found: ${FAILING:-unknown}"
            exit 1
          elif [[ "$EC" != "0" ]]; then
            echo "::error::Sourcegraph unreachable / config error — not a rule violation (verifier exit code: ${EC:-none})"
            exit 1
          fi
          ERRORS=$(jq -r '.summary.errors // 0' report.json)
          CHECKED=$(jq -r '.summary.checked // .summary.total' report.json)
          TOTAL=$(jq -r '.summary.total' report.json)
          if [[ "$ERRORS" -gt 0 ]]; then
            echo "::error::$ERRORS error(s) found despite exit code 0 (incomplete run)"
            exit 1
          fi
          if [[ "$CHECKED" -lt "$TOTAL" ]]; then
            echo "::error::Only $CHECKED of $TOTAL invariants were checked (incomplete run)"
            exit 1
          fi
          # Canary backstop: every canary MUST fire (fail with >= 1 violation).
          # A passing canary means search is silently broken — fail closed.
          CANARY_TOTAL=$(jq -r '[.results[]? | select(.id | startswith("canary-"))] | length' report.json)
          CANARY_FIRED=$(jq -r '[.results[]? | select(.id | startswith("canary-")) | select(.status == "fail" and (.violations | length) >= 1)] | length' report.json)
          if [[ "$CANARY_TOTAL" -gt 0 && "$CANARY_FIRED" -lt "$CANARY_TOTAL" ]]; then
            echo "::error::Canary invariant did not fire ($CANARY_FIRED of $CANARY_TOTAL) — Sourcegraph search may be silently broken, results untrustworthy"
            exit 1
          fi
