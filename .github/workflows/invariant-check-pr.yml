name: Cross-Repo Invariant Check (PR)

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.go"
      - "**/*.py"
      - "**/*.java"
      - "**/package.json"
      - "**/go.mod"
      - "**/requirements.txt"
      - ".github/invariants.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  # --- Step 1: Parse invariants.yml into a matrix JSON array ---
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      count: ${{ steps.parse.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate config schema
        run: |
          npx --yes ajv-cli validate -s .github/invariants.schema.json -d .github/invariants.yml --spec=draft2020 || {
            echo "::warning::Schema validation failed (non-blocking)"
          }

      - name: Parse invariants into matrix
        id: parse
        run: |
          MATRIX=$(yq -o=json '.invariants | [.[] | {"id": .id}]' .github/invariants.yml | jq -c '{include: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          COUNT=$(yq '.invariants | length' .github/invariants.yml)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Parsed $COUNT invariants into matrix"

  # --- Step 2: One job per invariant (isolation from B) ---
  verify:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          npm install -g @anthropic-ai/claude-code

      - name: Build prompt for ${{ matrix.id }}
        id: prompt
        run: |
          INV_ID="${{ matrix.id }}"
          INV=$(yq -o=json ".invariants[] | select(.id == \"$INV_ID\")" .github/invariants.yml)

          DESC=$(echo "$INV" | jq -r '.description')
          SEVERITY=$(echo "$INV" | jq -r '.severity')
          SEARCH=$(echo "$INV" | jq -r '.search.pattern')
          LANG=$(echo "$INV" | jq -r '.search.language // empty')
          MESSAGE=$(echo "$INV" | jq -r '.message')

          # Determine assertion type and pattern from the YAML keys
          if echo "$INV" | jq -e '.assertion.must_not_exist' > /dev/null 2>&1; then
            ASSERT_TYPE="must_not_exist"
            ASSERT_PATTERN=""
          elif echo "$INV" | jq -e '.assertion.must_contain' > /dev/null 2>&1; then
            ASSERT_TYPE="must_contain"
            ASSERT_PATTERN=$(echo "$INV" | jq -r '.assertion.must_contain')
          elif echo "$INV" | jq -e '.assertion.must_not_contain' > /dev/null 2>&1; then
            ASSERT_TYPE="must_not_contain"
            ASSERT_PATTERN=$(echo "$INV" | jq -r '.assertion.must_not_contain')
          fi
          SCOPE=$(echo "$INV" | jq -r '.assertion.scope // "repo"')

          LANG_LINE=""
          [[ -n "$LANG" ]] && LANG_LINE="Filter results to language: $LANG."

          cat > /tmp/prompt.txt << PROMPT_EOF
          Verify this cross-repo invariant using the instructions in CLAUDE.md.

          INVARIANT: $INV_ID
          DESCRIPTION: $DESC
          SEVERITY: $SEVERITY

          SEARCH:
            pattern: $SEARCH
            $LANG_LINE

          ASSERTION:
            type: $ASSERT_TYPE
            pattern: $ASSERT_PATTERN
            scope: $SCOPE

          Return ONLY a JSON object per the Output Contract in CLAUDE.md.
          PROMPT_EOF

      - name: Verify ${{ matrix.id }}
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SOURCEGRAPH_ENDPOINT: ${{ secrets.SOURCEGRAPH_ENDPOINT }}
          SOURCEGRAPH_TOKEN: ${{ secrets.SOURCEGRAPH_TOKEN }}
        run: |
          INV_ID="${{ matrix.id }}"
          INV=$(yq -o=json ".invariants[] | select(.id == \"$INV_ID\")" .github/invariants.yml)
          SEVERITY=$(echo "$INV" | jq -r '.severity')
          DESC=$(echo "$INV" | jq -r '.description')
          MESSAGE=$(echo "$INV" | jq -r '.message')

          CLAUDE_OUTPUT=""
          if CLAUDE_OUTPUT=$(cat /tmp/prompt.txt | claude -p --bare \
            --mcp-config .github/claude-mcp-config.json \
            --max-turns 10 \
            --allowedTools "mcp__sourcegraph__keyword_search,mcp__sourcegraph__find_references,mcp__sourcegraph__read_file" \
            2>/dev/null); then

            RESULT_JSON=$(echo "$CLAUDE_OUTPUT" | grep -o '{.*}' | head -1 || echo "")
            if [[ -n "$RESULT_JSON" ]] && echo "$RESULT_JSON" | jq . &>/dev/null; then
              STATUS=$(echo "$RESULT_JSON" | jq -r '.status')
              VIOLATIONS=$(echo "$RESULT_JSON" | jq -c '.violations')
            else
              STATUS="error"
              VIOLATIONS="[]"
            fi
          else
            STATUS="error"
            VIOLATIONS="[]"
          fi

          # Write structured result for the report job
          jq -n \
            --arg id "$INV_ID" \
            --arg desc "$DESC" \
            --arg severity "$SEVERITY" \
            --arg status "$STATUS" \
            --arg message "$MESSAGE" \
            --argjson violations "$VIOLATIONS" \
            '{id: $id, description: $desc, severity: $severity, status: $status, message: $message, violations: $violations}' \
            > result.json

          echo "Result for $INV_ID: $STATUS"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.id }}
          path: result.json
          retention-days: 7

  # --- Step 3: Collect results, post PR comment ---
  report:
    needs: [setup, verify]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results/

      - name: Assemble report
        id: assemble
        run: |
          RESULTS="[]"
          PASS=0; FAIL=0; ERRORS=0

          for dir in results/result-*/; do
            if [[ -f "$dir/result.json" ]]; then
              ENTRY=$(cat "$dir/result.json")
              STATUS=$(echo "$ENTRY" | jq -r '.status')
              case "$STATUS" in
                pass)  PASS=$((PASS + 1)) ;;
                fail)  FAIL=$((FAIL + 1)) ;;
                *)     ERRORS=$((ERRORS + 1)) ;;
              esac
              RESULTS=$(echo "$RESULTS" | jq --argjson e "$ENTRY" '. + [$e]')
            fi
          done

          TOTAL=${{ needs.setup.outputs.count }}
          jq -n \
            --argjson results "$RESULTS" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson total "$TOTAL" \
            --argjson passed "$PASS" \
            --argjson failed "$FAIL" \
            --argjson errors "$ERRORS" \
            '{timestamp: $timestamp, summary: {total: $total, passed: $passed, failed: $failed, errors: $errors}, results: $results}' \
            > report.json

          echo "failed=$FAIL" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat report.json)
          FAILED=$(echo "$REPORT" | jq -r '.summary.failed')
          TOTAL=$(echo "$REPORT" | jq -r '.summary.total')

          if [[ "$FAILED" -eq 0 ]]; then
            COMMENT="## :white_check_mark: Cross-Repo Invariant Check — All $TOTAL passed"
          else
            COMMENT="## :x: Cross-Repo Invariant Check — $FAILED violation(s) found"
          fi

          COMMENT+="\n\n| Invariant | Severity | Status | Violations |\n|-----------|----------|--------|------------|\n"

          for row in $(echo "$REPORT" | jq -r '.results[] | @base64'); do
            R=$(echo "$row" | base64 -d)
            ID=$(echo "$R" | jq -r '.id')
            SEV=$(echo "$R" | jq -r '.severity')
            ST=$(echo "$R" | jq -r '.status')
            VC=$(echo "$R" | jq '.violations | length')
            case "$ST" in
              pass) ICON=":white_check_mark:" ;;
              fail) ICON=":x:" ;;
              *)    ICON=":warning:" ;;
            esac
            COMMENT+="| \`$ID\` | $SEV | $ICON $ST | $VC |\n"
          done

          # Violation details
          if [[ "$FAILED" -gt 0 ]]; then
            COMMENT+="\n### Violations\n\n"
            for row in $(echo "$REPORT" | jq -r '.results[] | select(.status == "fail") | @base64'); do
              R=$(echo "$row" | base64 -d)
              ID=$(echo "$R" | jq -r '.id')
              MSG=$(echo "$R" | jq -r '.message')
              COMMENT+="**\`$ID\`** — $MSG\n"
              for v in $(echo "$R" | jq -r '.violations[:10][] | @base64'); do
                V=$(echo "$v" | base64 -d)
                VREPO=$(echo "$V" | jq -r '.repo')
                VFILE=$(echo "$V" | jq -r '.file')
                VLINE=$(echo "$V" | jq -r '.line')
                COMMENT+="- \`$VREPO\` — \`$VFILE:$VLINE\`\n"
              done
              COMMENT+="\n"
            done
          fi

          COMMENT+="\n---\n_Checked by Cross-Repo Invariant Verifier_"
          echo -e "$COMMENT" | gh pr comment "${{ github.event.pull_request.number }}" --body-file -

      - name: Fail on violations
        if: steps.assemble.outputs.failed != '0'
        run: |
          echo "::error::${{ steps.assemble.outputs.failed }} invariant violation(s) found"
          exit 1
