name: Cross-Repo Invariant Check (PR)

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.go"
      - "**/*.py"
      - "**/*.java"
      - "**/package.json"
      - "**/go.mod"
      - "**/requirements.txt"
      - "invariants.yaml"
      - "invariants.json"
      - "CLAUDE.md"

concurrency:
  group: invariant-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  verify-invariants:
    needs: build-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Pin trusted files to base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Prevent PR authors from modifying their own invariant checks, agent instructions,
          # or orchestration scripts. Always use the base branch versions of trust-boundary files.
          git fetch origin "$BASE_REF" --depth=1
          git show "origin/$BASE_REF:invariants.yaml" > invariants.yaml 2>/dev/null || echo "invariants: []" > invariants.yaml
          git show "origin/$BASE_REF:CLAUDE.md" > CLAUDE.md 2>/dev/null || true
          git show "origin/$BASE_REF:invariants.schema.json" > invariants.schema.json 2>/dev/null || true
          git show "origin/$BASE_REF:scripts/verify-invariants.sh" > scripts/verify-invariants.sh 2>/dev/null || true
          git show "origin/$BASE_REF:scripts/post-github-comment.sh" > scripts/post-github-comment.sh 2>/dev/null || true
          echo "Using trust-boundary files from base branch: $BASE_REF"

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.1"
          YQ_SHA256="a7df369b3129c22ade6b3c05b9b71271af28a0c41a3d9e205a91baa44a9f4450"
          wget -qO /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@1.0.33

      - name: Validate invariants config
        run: |
          # Optional: validate against JSON Schema if ajv-cli is available
          if npx ajv-cli validate -s invariants.schema.json -d invariants.yaml --spec=draft2020 2>/dev/null; then
            echo "Config validation passed"
          else
            echo "::warning::Schema validation skipped or failed (non-blocking)"
          fi

      - name: Setup Claude OAuth credentials
        run: |
          mkdir -p ~/.claude
          echo '${{ secrets.CLAUDE_OAUTH_CREDENTIALS }}' > ~/.claude/.credentials.json

      - name: Verify cross-repo invariants
        id: verify
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SRC_ACCESS_TOKEN: ${{ secrets.SRC_ACCESS_TOKEN }}
        run: |
          chmod +x scripts/verify-invariants.sh
          # Run verifier; capture output even on failure (exit 1 = violations found)
          scripts/verify-invariants.sh -v > report.json || true

      - name: Post or update PR comment
        if: always() && steps.verify.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- invariant-check-bot -->"

          # Build comment body
          BODY=$(scripts/post-github-comment.sh --format-only "$REPO" "$PR" < report.json)
          FULL_BODY=$(printf '%s\n%s' "$MARKER" "$BODY")

          # Find existing bot comment
          EXISTING=$(gh api "repos/$REPO/issues/$PR/comments" --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)

          if [[ -n "$EXISTING" ]]; then
            printf '%s' "$FULL_BODY" | gh api "repos/$REPO/issues/comments/$EXISTING" -X PATCH --field body=@-
            echo "Updated existing comment $EXISTING"
          else
            printf '%s' "$FULL_BODY" | gh pr comment "$PR" --repo "$REPO" --body-file -
            echo "Created new comment"
          fi

      - name: Fail on violations, errors, or incomplete results
        run: |
          FAILED=$(jq -r '.summary.failed' report.json)
          ERRORS=$(jq -r '.summary.errors // 0' report.json)
          CHECKED=$(jq -r '.summary.checked // .summary.total' report.json)
          TOTAL=$(jq -r '.summary.total' report.json)
          if [[ "$FAILED" -gt 0 || "$ERRORS" -gt 0 ]]; then
            echo "::error::$FAILED violation(s), $ERRORS error(s) found"
            exit 1
          fi
          if [[ "$CHECKED" -lt "$TOTAL" ]]; then
            echo "::error::Only $CHECKED of $TOTAL invariants were checked (incomplete run)"
            exit 1
          fi
