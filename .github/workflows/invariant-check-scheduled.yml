name: Cross-Repo Invariant Check (Scheduled)

on:
  schedule:
    # Weekly: Monday 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  verify-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify cross-repo invariants
        id: verify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SOURCEGRAPH_ENDPOINT: ${{ secrets.SOURCEGRAPH_ENDPOINT }}
          SOURCEGRAPH_TOKEN: ${{ secrets.SOURCEGRAPH_TOKEN }}
        run: |
          chmod +x scripts/verify-invariants.sh
          scripts/verify-invariants.sh -v > report.json || true

      - name: Post to Slack
        if: always() && steps.verify.outcome != 'cancelled'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/post-slack.sh
          cat report.json | scripts/post-slack.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-report-${{ github.run_id }}
          path: report.json
          retention-days: 30
