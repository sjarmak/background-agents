name: Cross-Repo Invariant Check (Scheduled)

on:
  schedule:
    # Weekly: Monday 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: invariant-check-scheduled
  cancel-in-progress: false  # must not cancel in-flight integrity checks

permissions:
  contents: read

jobs:
  verify-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.1"
          YQ_SHA256="a7df369b3129c22ade6b3c05b9b71271af28a0c41a3d9e205a91baa44a9f4450"
          wget -qO /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@1.0.33

      - name: Setup Claude OAuth credentials
        run: |
          mkdir -p ~/.claude
          echo '${{ secrets.CLAUDE_OAUTH_CREDENTIALS }}' > ~/.claude/.credentials.json

      - name: Verify cross-repo invariants
        id: verify
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SRC_ACCESS_TOKEN: ${{ secrets.SRC_ACCESS_TOKEN }}
        run: |
          chmod +x scripts/verify-invariants.sh
          scripts/verify-invariants.sh -v > report.json || true

      - name: Post to Slack
        if: always() && steps.verify.outcome != 'cancelled'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/post-slack.sh
          cat report.json | scripts/post-slack.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: invariant-report-${{ github.run_id }}
          path: report.json
          retention-days: 30
