name: Cross-Repo Invariant Check (Scheduled)

on:
  schedule:
    # Weekly: Monday 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      config_file:
        description: "Invariants config file path (relative to repo root)"
        type: string
        required: false
        default: "config/invariants.json"

concurrency:
  group: invariant-check-scheduled
  cancel-in-progress: false  # must not cancel in-flight integrity checks

permissions:
  contents: read

jobs:
  verify-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@1.0.33

      - name: Setup Claude OAuth credentials
        run: |
          mkdir -p ~/.claude
          echo '${{ secrets.CLAUDE_OAUTH_CREDENTIALS }}' > ~/.claude/.credentials.json

      - name: Verify cross-repo invariants
        id: verify
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SRC_ACCESS_TOKEN: ${{ secrets.SRC_ACCESS_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file || 'config/invariants.json' }}
        run: |
          echo "::add-mask::$SRC_ACCESS_TOKEN"
          echo "::add-mask::$SOURCEGRAPH_URL"
          chmod +x scripts/verify-invariants.sh
          scripts/verify-invariants.sh -v -c "$CONFIG_FILE" > report.json || true

      - name: Post to Slack
        if: always() && steps.verify.outcome != 'cancelled'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/post-slack.sh
          cat report.json | scripts/post-slack.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: invariant-report-${{ github.run_id }}
          path: report.json
          retention-days: 30
