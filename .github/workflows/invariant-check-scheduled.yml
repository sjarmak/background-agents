name: Cross-Repo Invariant Check (Scheduled)

on:
  schedule:
    # Weekly: Monday 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      config_file:
        description: "Invariants config file path (relative to repo root)"
        type: string
        required: false
        default: "config/invariants.json"

concurrency:
  group: invariant-check-scheduled
  cancel-in-progress: false  # must not cancel in-flight integrity checks

permissions:
  contents: read

jobs:
  verify-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify cross-repo invariants
        id: verify
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SRC_ACCESS_TOKEN: ${{ secrets.SRC_ACCESS_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file || 'config/invariants.json' }}
        run: |
          echo "::add-mask::$SRC_ACCESS_TOKEN"
          echo "::add-mask::$SOURCEGRAPH_URL"
          # Run TS/GraphQL verifier; capture the real exit code without failing
          # the step (0 = pass, 1 = violations, 2 = infrastructure error) so
          # Slack post and artifact upload still run. The gate step below is
          # authoritative on this code.
          EC=0
          INVARIANTS_CONFIG="$CONFIG_FILE" npx tsx src/index.ts --mode=cli > report.json || EC=$?
          echo "exit_code=$EC" >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        if: always() && steps.verify.outcome != 'cancelled'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ ! -s report.json ]]; then
            echo "report.json missing or empty — skipping Slack post"
            exit 0
          fi
          chmod +x scripts/post-slack.sh
          cat report.json | scripts/post-slack.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: invariant-report-${{ github.run_id }}
          path: report.json
          retention-days: 30

      - name: Fail on violations or infrastructure errors
        run: |
          # The verifier exit code is the authoritative gate; the jq checks
          # below are a completeness backstop only (mirrors the PR gate).
          EC="${{ steps.verify.outputs.exit_code }}"
          if [[ "$EC" == "1" ]]; then
            FAILING=$(jq -r '[.results[]? | select(.status == "fail") | .id] | join(", ")' report.json 2>/dev/null || echo "unknown")
            echo "::error::Invariant violation(s) found: ${FAILING:-unknown}"
            exit 1
          elif [[ "$EC" != "0" ]]; then
            echo "::error::Sourcegraph unreachable / config error — not a rule violation (verifier exit code: ${EC:-none})"
            exit 1
          fi
          ERRORS=$(jq -r '.summary.errors // 0' report.json)
          CHECKED=$(jq -r '.summary.checked // .summary.total' report.json)
          TOTAL=$(jq -r '.summary.total' report.json)
          if [[ "$ERRORS" -gt 0 ]]; then
            echo "::error::$ERRORS error(s) found despite exit code 0 (incomplete run)"
            exit 1
          fi
          if [[ "$CHECKED" -lt "$TOTAL" ]]; then
            echo "::error::Only $CHECKED of $TOTAL invariants were checked (incomplete run)"
            exit 1
          fi
          # Canary backstop: every canary MUST fire (fail with >= 1 violation).
          # A passing canary means search is silently broken — fail closed.
          CANARY_TOTAL=$(jq -r '[.results[]? | select(.id | startswith("canary-"))] | length' report.json)
          CANARY_FIRED=$(jq -r '[.results[]? | select(.id | startswith("canary-")) | select(.status == "fail" and (.violations | length) >= 1)] | length' report.json)
          if [[ "$CANARY_TOTAL" -gt 0 && "$CANARY_FIRED" -lt "$CANARY_TOTAL" ]]; then
            echo "::error::Canary invariant did not fire ($CANARY_FIRED of $CANARY_TOTAL) — Sourcegraph search may be silently broken, results untrustworthy"
            exit 1
          fi
