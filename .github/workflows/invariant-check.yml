name: Cross-Repo Invariant Check

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.go"
      - "**/*.py"
      - "**/*.java"
      - "**/package.json"
      - "**/go.mod"
      - "**/requirements.txt"
      - "invariants.json"
  schedule:
    # Weekly: Monday 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify invariants
        id: verify
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SOURCEGRAPH_TOKEN: ${{ secrets.SOURCEGRAPH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INVARIANTS_CONFIG: invariants.json
        run: |
          node dist/index.js --mode=ci > report.json || true

      # Scheduled runs: post to Slack via webhook (Parent B's approach)
      - name: Post to Slack (scheduled only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/post-slack.sh
          cat report.json | scripts/post-slack.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-report-${{ github.run_id }}
          path: report.json
          retention-days: 30

      - name: Fail on critical/high violations
        run: |
          FAILED=$(jq -r '.summary.failed' report.json)
          if [[ "$FAILED" -gt 0 ]]; then
            HAS_BLOCKING=$(jq '[.results[] | select(.status == "fail" and (.severity == "critical" or .severity == "high"))] | length' report.json)
            if [[ "$HAS_BLOCKING" -gt 0 ]]; then
              echo "::error::$FAILED invariant violation(s) found with blocking severity"
              exit 1
            fi
            echo "::warning::$FAILED invariant violation(s) found (non-blocking severity)"
          fi
