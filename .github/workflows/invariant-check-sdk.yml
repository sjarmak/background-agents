name: Cross-Repo Invariant Check (Agent SDK)

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    # Weekly scan — Monday 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify invariants
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SOURCEGRAPH_TOKEN: ${{ secrets.SOURCEGRAPH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INVARIANTS_CONFIG: invariants.json
        run: node dist/index.js --mode=ci

      # On scheduled runs, also post to Slack
      - name: Notify Slack (scheduled only)
        if: github.event_name == 'schedule'
        env:
          SOURCEGRAPH_URL: ${{ secrets.SOURCEGRAPH_URL }}
          SOURCEGRAPH_TOKEN: ${{ secrets.SOURCEGRAPH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL: "#engineering-alerts"
        run: |
          # For scheduled runs, we'd use server mode with a one-shot flag
          # For now, the CI mode output is sufficient
          echo "Scheduled scan complete — see job output for results"
